name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v2.0.1 or v2.0.1-rc1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          # Tag-push uses the pushed ref; manual dispatch uses the typed input.
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          case "$tag" in
            v*) ;;
            *) echo "::error::Tag '$tag' must start with 'v' (e.g. v2.0.1)"; exit 1 ;;
          esac
          full="${tag#v}"
          base="${full%%-*}"
          if [ "$full" != "$base" ]; then
            is_pre=true
          else
            is_pre=false
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "is_pre=$is_pre" >> "$GITHUB_OUTPUT"
          echo "Tag: $tag -> full=$full, base=$base, prerelease=$is_pre"

      - name: Verify base version matches manifests
        run: |
          base='${{ steps.version.outputs.base }}'
          pyver=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          manver=$(grep -E '^version[[:space:]]*=' addons/blender_mcp_addon/blender_manifest.toml | sed -E 's/.*"([^"]+)".*/\1/')
          blver=$(python3 -c "import re; m=re.search(r'\"version\":\s*\(([0-9]+),\s*([0-9]+),\s*([0-9]+)\)', open('addons/blender_mcp_addon/__init__.py').read()); print('.'.join(m.groups()))")
          echo "base=$base  pyproject=$pyver  manifest=$manver  bl_info=$blver"
          if [ "$base" != "$pyver" ] || [ "$base" != "$manver" ] || [ "$base" != "$blver" ]; then
            echo "::error::Tag base version ($base) does not match pyproject/manifest/bl_info"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build Blender addon zip
        run: |
          ZIP_NAME="blender_mcp_addon-${{ steps.version.outputs.full }}.zip"
          (cd addons && zip -r "../dist/${ZIP_NAME}" blender_mcp_addon -x '*/__pycache__/*' '*.pyc')
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Build MCP server zip
        run: |
          # Self-contained source bundle of the MCP server, for users who grab
          # it directly instead of installing the wheel from PyPI/uvx.
          MCP_ZIP="blender_mcp_server-${{ steps.version.outputs.full }}.zip"
          zip -r "dist/${MCP_ZIP}" \
            blender_mcp main.py pyproject.toml uv.lock .python-version README.md LICENSE \
            -x '*/__pycache__/*' '*.pyc'
          echo "MCP_ZIP=${MCP_ZIP}" >> "$GITHUB_ENV"

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/${{ env.ZIP_NAME }}
            dist/${{ env.MCP_ZIP }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.version.outputs.is_pre == 'true' }}
