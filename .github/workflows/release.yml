name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches manifests
        run: |
          tag='${{ steps.version.outputs.version }}'
          pyver=$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          manver=$(grep -E '^version[[:space:]]*=' src/blender_mcp_addon/blender_manifest.toml | sed -E 's/.*"([^"]+)".*/\1/')
          blver=$(python3 -c "import re,sys; m=re.search(r'\"version\":\s*\(([0-9]+),\s*([0-9]+),\s*([0-9]+)\)', open('src/blender_mcp_addon/__init__.py').read()); print('.'.join(m.groups()))")
          echo "tag=$tag  pyproject=$pyver  manifest=$manver  bl_info=$blver"
          if [ "$tag" != "$pyver" ] || [ "$tag" != "$manver" ] || [ "$tag" != "$blver" ]; then
            echo "::error::Version mismatch between git tag and manifests"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build Blender addon zip
        run: |
          ZIP_NAME="blender_mcp_addon-${{ steps.version.outputs.version }}.zip"
          (cd src && zip -r "../dist/${ZIP_NAME}" blender_mcp_addon -x '*/__pycache__/*' '*.pyc')
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/${{ env.ZIP_NAME }}
          generate_release_notes: true
          fail_on_unmatched_files: true
